spring.application.name=market-backend

# Le ponemos un puerto por defecto por si Render tarda en mapearla al compilar
server.port=${PORT:8080}

# Variables puras de la base de datos (Se inyectan desde Render obligatoriamente)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Aquí usamos valores por defecto fijos porque NO son datos sensibles ni contraseñas
spring.jpa.show-sql=${SHOW_SQL:false}

# JWT (El secreto es obligatorio desde Render, el tiempo exp puede ser fijo)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (Obligatorio desde Render)
cors.allowed-origins=${CORS_ORIGINS}

# Email SMTP (Los correos y contraseñas van vacíos, las propiedades del servidor fijas)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# Como el remitente suele ser el mismo correo, lo vinculamos a MAIL_USERNAME
spring.mail.from=${MAIL_USERNAME}

# Google Maps / Places (clave restringida por dominio en Google Cloud Console)
google.maps.api-key=${GOOGLE_MAPS_API_KEY}